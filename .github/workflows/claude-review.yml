name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    # Review jobs serialize per PR: the second push's run depends on the first's
    # state-marker write, so cancel-in-progress: false keeps both runs queued.
    # The second pass reads the SHA the first wrote and only diffs the new commit.
    concurrency:
      group: claude-review-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/review/pnpm-lock.yaml

      - name: Install reviewer deps
        working-directory: scripts/review
        run: pnpm install --frozen-lockfile

      - name: Run review
        working-directory: scripts/review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_ROOT: ${{ github.workspace }}
        run: pnpm review

  reply:
    if: github.event_name == 'pull_request_review_comment' && github.actor != 'github-actions[bot]'
    # Per-comment concurrency so a batch of replies on different comments doesn't
    # cancel each other out. cancel-in-progress: true on same-comment edits keeps
    # only the latest evaluation.
    concurrency:
      group: claude-review-reply-${{ github.event.comment.id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/review/pnpm-lock.yaml

      - name: Install reviewer deps
        working-directory: scripts/review
        run: pnpm install --frozen-lockfile

      - name: Evaluate reply
        working-directory: scripts/review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO_ROOT: ${{ github.workspace }}
        run: pnpm reply
