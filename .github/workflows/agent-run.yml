name: Agent Run

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run-agent:
    if: github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "vata-agent[bot]"
          git config user.email "vata-agent@users.noreply.github.com"

      - name: Fetch issue data
        run: gh issue view "$ISSUE_NUMBER" --json title,body,url,labels > /tmp/issue.json

      - name: Detect Opus opt-in
        id: model
        run: |
          if jq -e '.labels[] | select(.name == "agent:use-opus")' /tmp/issue.json > /dev/null; then
            echo "use_opus=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_opus=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reset agent labels to running
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "agent:ready" \
            --remove-label "agent:success" \
            --remove-label "agent:partial" \
            --remove-label "agent:failed" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:running"

      - name: Cleanup any pre-existing agent branch
        run: |
          BRANCH="agent/issue-$ISSUE_NUMBER"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git branch -D "$BRANCH" 2>/dev/null || true

      - name: Run agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_OPUS: ${{ steps.model.outputs.use_opus }}
          ISSUE_DATA_PATH: /tmp/issue.json
        run: pnpm exec tsx .sandcastle/main.ts

      - name: Compute outcome
        id: outcome
        if: always()
        env:
          AGENT_STEP: ${{ steps.agent.outcome }}
          COMMITS: ${{ steps.agent.outputs.commits }}
          COMPLETED: ${{ steps.agent.outputs.completed }}
          VERIFY_PASSED: ${{ steps.agent.outputs.verify_passed }}
        run: |
          if [ "$AGENT_STEP" != "success" ] || [ -z "$COMMITS" ] || [ "$COMMITS" = "0" ]; then
            echo "outcome=failed" >> "$GITHUB_OUTPUT"
          elif [ "$VERIFY_PASSED" != "true" ]; then
            echo "outcome=failed" >> "$GITHUB_OUTPUT"
          elif [ "$COMPLETED" = "true" ]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=partial" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        if: steps.outcome.outputs.outcome == 'success' || steps.outcome.outputs.outcome == 'partial'
        run: git push origin "${{ steps.agent.outputs.branch }}"

      - name: Open PR
        if: steps.outcome.outputs.outcome == 'success' || steps.outcome.outputs.outcome == 'partial'
        env:
          OUTCOME: ${{ steps.outcome.outputs.outcome }}
          BRANCH: ${{ steps.agent.outputs.branch }}
          ITERATIONS: ${{ steps.agent.outputs.iterations }}
          MODEL: ${{ steps.agent.outputs.model }}
        run: |
          ISSUE_TITLE=$(jq -r .title /tmp/issue.json)
          DRAFT_FLAG=""
          TITLE_PREFIX=""
          NOTE=""
          if [ "$OUTCOME" = "partial" ]; then
            DRAFT_FLAG="--draft"
            TITLE_PREFIX="[draft] "
            NOTE=$'\n\n> [!WARNING]\n> Agent exhausted maxIterations without signaling completion. Verification passed on the branch, but the agent considered the work unfinished. Review carefully or push corrections before merging.'
          fi

          BODY="Closes #${ISSUE_NUMBER}

          Generated by the agent workflow.
          - Iterations: ${ITERATIONS}
          - Model: ${MODEL}${NOTE}"

          gh pr create $DRAFT_FLAG \
            --head "$BRANCH" \
            --base main \
            --title "${TITLE_PREFIX}${ISSUE_TITLE}" \
            --body "$BODY"

      - name: Comment on failure
        if: steps.outcome.outputs.outcome == 'failed'
        env:
          ITERATIONS: ${{ steps.agent.outputs.iterations }}
          COMMITS: ${{ steps.agent.outputs.commits }}
          MODEL: ${{ steps.agent.outputs.model }}
        run: |
          BODY="❌ Agent run failed.

          - Iterations: ${ITERATIONS:-n/a}
          - Commits: ${COMMITS:-0}
          - Model: ${MODEL:-n/a}

          Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Amend the issue body (if scoping issue) and re-label \`agent:ready\` to retry. Optionally add \`agent:use-opus\` to escalate."

          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      - name: Apply final label
        if: always()
        env:
          OUTCOME: ${{ steps.outcome.outputs.outcome }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:running" 2>/dev/null || true
          LABEL_OUTCOME="${OUTCOME:-failed}"
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:${LABEL_OUTCOME}"
