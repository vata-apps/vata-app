name: Agent Run

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run-agent:
    if: github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      PR_BODY_PATH: /tmp/agent-pr-body.md

    steps:
      # Mint a token from the vata-agent GitHub App — used instead of
      # GITHUB_TOKEN (whose PRs do not trigger ci.yml) and instead of a PAT
      # (whose actions are attributed to a person, not the bot).
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${BOT_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Fetch issue data
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh issue view "$ISSUE_NUMBER" --json title,body,url,labels > /tmp/issue.json

      - name: Detect Opus opt-in
        id: model
        run: |
          if jq -e '.labels[] | select(.name == "agent:use-opus")' /tmp/issue.json > /dev/null; then
            echo "use_opus=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_opus=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reset agent labels to running
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "agent:ready" \
            --remove-label "agent:success" \
            --remove-label "agent:partial" \
            --remove-label "agent:failed" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:running"

      - name: Cleanup any pre-existing agent branch
        run: |
          BRANCH="agent/issue-$ISSUE_NUMBER"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git branch -D "$BRANCH" 2>/dev/null || true

      - name: Run agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_OPUS: ${{ steps.model.outputs.use_opus }}
          ISSUE_DATA_PATH: /tmp/issue.json
        run: pnpm exec tsx .sandcastle/run.ts

      - name: Compute outcome
        id: outcome
        if: always()
        env:
          AGENT_STEP: ${{ steps.agent.outcome }}
          COMMITS: ${{ steps.agent.outputs.commits }}
          COMPLETED: ${{ steps.agent.outputs.completed }}
          VERIFY_PASSED: ${{ steps.agent.outputs.verify_passed }}
        run: |
          if [ "$AGENT_STEP" != "success" ] || [ -z "$COMMITS" ] || [ "$COMMITS" = "0" ]; then
            echo "outcome=failed" >> "$GITHUB_OUTPUT"
          elif [ "$VERIFY_PASSED" != "true" ]; then
            echo "outcome=failed" >> "$GITHUB_OUTPUT"
          elif [ "$COMPLETED" = "true" ]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=partial" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and open PR
        id: deliver
        if: steps.outcome.outputs.outcome == 'success' || steps.outcome.outputs.outcome == 'partial'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OUTCOME: ${{ steps.outcome.outputs.outcome }}
          BRANCH: ${{ steps.agent.outputs.branch }}
          ITERATIONS: ${{ steps.agent.outputs.iterations }}
          MODEL: ${{ steps.agent.outputs.model }}
        run: |
          git push origin "$BRANCH"

          ISSUE_TITLE=$(jq -r .title /tmp/issue.json)
          DRAFT_FLAG=""
          TITLE_PREFIX=""
          NOTE=""
          if [ "$OUTCOME" = "partial" ]; then
            DRAFT_FLAG="--draft"
            TITLE_PREFIX="[draft] "
            NOTE=$'\n> [!WARNING]\n> Agent exhausted maxIterations without signaling completion. Verification passed on the branch, but the agent considered the work unfinished. Review carefully or push corrections before merging.\n'
          fi

          if [ -f "$PR_BODY_PATH" ]; then
            DESCRIPTION=$(cat "$PR_BODY_PATH")
          else
            DESCRIPTION="_The agent did not provide a description._"
          fi

          BODY="Closes #${ISSUE_NUMBER}

          ${DESCRIPTION}
          ${NOTE}
          ---
          🤖 Agent workflow · ${ITERATIONS} iteration(s) · ${MODEL}"

          gh pr create $DRAFT_FLAG \
            --head "$BRANCH" \
            --base main \
            --title "${TITLE_PREFIX}${ISSUE_TITLE}" \
            --body "$BODY"

      - name: Comment on failure
        if: steps.outcome.outputs.outcome == 'failed' || steps.deliver.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DELIVER: ${{ steps.deliver.outcome }}
          BRANCH: ${{ steps.agent.outputs.branch }}
          ITERATIONS: ${{ steps.agent.outputs.iterations }}
          COMMITS: ${{ steps.agent.outputs.commits }}
          MODEL: ${{ steps.agent.outputs.model }}
        run: |
          if [ "$DELIVER" = "failure" ]; then
            DETAIL="The agent's work is committed on branch \`${BRANCH}\`, but pushing it or opening the PR failed. Open a PR from that branch manually, or re-label \`agent:ready\` to retry from scratch."
          else
            DETAIL="Amend the issue body (if scoping issue) and re-label \`agent:ready\` to retry. Optionally add \`agent:use-opus\` to escalate."
          fi

          BODY="❌ Agent run failed.

          - Iterations: ${ITERATIONS:-n/a}
          - Commits: ${COMMITS:-0}
          - Model: ${MODEL:-n/a}

          Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ${DETAIL}"

          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      - name: Apply final label
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OUTCOME: ${{ steps.outcome.outputs.outcome }}
          DELIVER: ${{ steps.deliver.outcome }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:running" 2>/dev/null || true
          if [ "$DELIVER" = "failure" ]; then
            LABEL_OUTCOME="failed"
          else
            LABEL_OUTCOME="${OUTCOME:-failed}"
          fi
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:${LABEL_OUTCOME}"
