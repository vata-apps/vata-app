name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  # Lightweight gate, deliberately carrying no concurrency block: a run that
  # gets skipped here (in particular, the reviewer's own push) must never
  # enter the `review` job's concurrency group, or it would cancel a
  # legitimate in-flight review. See ADR-004 (docs/adr/0004-autonomous-agent-pipeline.md).
  # Runs on every PR now, not just agent-authored ones — but same-repo only:
  # a fork PR's pull_request event gets no repo secrets and can't be pushed
  # to, so it must be skipped cleanly here rather than fail later.
  triage:
    if: >-
      github.event.sender.login != 'vata-reviewer[bot]'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
      && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "proceed"

  review:
    needs: triage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    concurrency:
      group: agent-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      ISSUE_DATA_PATH: /tmp/issue.json
      REVIEW_FINDINGS_PATH: /tmp/review-findings.md

    steps:
      - name: Generate reviewer app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.REVIEWER_APP_CLIENT_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${BOT_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          # actions/checkout v6 stopped persisting the auth header to .git/config,
          # so wire gh's credential helper into git for later push steps.
          gh auth setup-git

      # Agent branches encode their issue in the name (agent/issue-N); for any
      # other branch, fall back to the PR's own closing-issue link (the
      # "Closes #N" convention from the link-task skill). No match just means
      # no issue context — reviewed against CLAUDE.md and the diff alone.
      - name: Resolve issue number
        id: issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          case "$BRANCH" in
            agent/issue-*)
              NUMBER="${BRANCH#agent/issue-}" ;;
            *)
              NUMBER=$(gh pr view "$PR_NUMBER" --json closingIssuesReferences \
                --jq '.closingIssuesReferences[0].number // empty') ;;
          esac
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"

      - name: Fetch issue data
        if: steps.issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: gh issue view "$ISSUE_NUMBER" --json title,body,url,labels > /tmp/issue.json

      - name: Run reviewer
        id: reviewer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_DATA_PATH: /tmp/issue.json
          REVIEW_FINDINGS_PATH: /tmp/review-findings.md
        run: pnpm exec tsx .sandcastle/review.ts

      # Split from the comment step so a push failure (rejected, non-fast-
      # forward) cannot abort the job before the maintainer is told anything.
      - name: Push fixes
        id: push
        if: "!cancelled() && steps.reviewer.outputs.push == 'true'"
        continue-on-error: true
        run: git push origin "$BRANCH"

      # !cancelled() matters here: a newer commit cancels this run via the
      # concurrency group above, killing "Run reviewer" mid-flight with no
      # outputs set. Without this guard, `if: always()` would still post a
      # misleading "Review failed" comment for a run that was only ever
      # superseded, not actually broken — the newer run's comment is
      # authoritative.
      - name: Post review comment
        if: "!cancelled()"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OUTCOME: ${{ steps.reviewer.outputs.outcome }}
          PUSH: ${{ steps.reviewer.outputs.push }}
          PUSH_OUTCOME: ${{ steps.push.outcome }}
          COMMITS: ${{ steps.reviewer.outputs.commits }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$PUSH" = "true" ] && [ "$PUSH_OUTCOME" = "failure" ]; then
            HEADER="⚠️ Found and fixed issues, but pushing the fix failed — see logs: ${RUN_URL}"
          else
            case "$OUTCOME" in
              fixed)
                HEADER="✅ Reviewed and approved, pushed ${COMMITS} fix commit(s) — see below" ;;
              clean)
                HEADER="✅ Reviewed and approved — no issues found" ;;
              noted)
                HEADER="ℹ️ Reviewed — no defects to fix, but see notes for your judgment" ;;
              flagged)
                if [ "$PUSH" = "true" ]; then
                  HEADER="⚠️ Reviewed, pushed ${COMMITS} fix commit(s) — other issues need your judgment, see below"
                else
                  HEADER="⚠️ Found issues, couldn't safely fix — list for the maintainer"
                fi
                ;;
              *)
                HEADER="❌ Review failed — ${RUN_URL}" ;;
            esac
          fi

          {
            echo "$HEADER"
            if [ -f "$REVIEW_FINDINGS_PATH" ]; then
              echo
              cat "$REVIEW_FINDINGS_PATH"
            fi
          } > /tmp/review-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/review-comment.md

      # `approve` (whether nothing is left for the maintainer to judge) comes
      # from decideReviewOutcome — the single source of truth for the outcome
      # table, see shared.ts. Only the push step's actual result is checked
      # here, since it's a runtime signal not known until after review.ts
      # exits. continue-on-error so an approval hiccup (e.g. self-review
      # rules) can't flip the whole run red under a comment that already said
      # "approved".
      - name: Approve PR
        if: "!cancelled() && steps.reviewer.outputs.approve == 'true' && steps.push.outcome != 'failure'"
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review "$PR_NUMBER" --approve --body "No outstanding issues."
