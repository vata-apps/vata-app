name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  review:
    if: >-
      github.event.sender.login != 'vata-reviewer[bot]'
      && github.event.pull_request.user.login == 'vata-agent[bot]'
      && github.event.pull_request.draft == false
      && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    concurrency:
      group: agent-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      ISSUE_DATA_PATH: /tmp/issue.json
      REVIEW_FINDINGS_PATH: /tmp/review-findings.md

    steps:
      - name: Generate reviewer app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.REVIEWER_APP_CLIENT_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@1.17.18

      - name: Configure OpenCode Go auth
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"opencode-go":{"type":"api","key":"%s"}}' "$OPENCODE_GO_API_KEY" > ~/.local/share/opencode/auth.json

      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${BOT_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          # actions/checkout v6 stopped persisting the auth header to .git/config,
          # so wire gh's credential helper into git for later push steps.
          gh auth setup-git

      - name: Resolve issue number
        id: issue
        run: |
          case "$BRANCH" in
            agent/issue-*)
              echo "number=${BRANCH#agent/issue-}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::PR branch '$BRANCH' is not an agent/issue-* branch"
              exit 1 ;;
          esac

      - name: Fetch issue data
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: gh issue view "$ISSUE_NUMBER" --json title,body,url,labels > /tmp/issue.json

      - name: Detect escalation opt-in
        id: model
        run: |
          if jq -e '.labels[] | select(.name == "agent:escalate")' /tmp/issue.json > /dev/null; then
            echo "escalate=true" >> "$GITHUB_OUTPUT"
          else
            echo "escalate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run reviewer
        id: reviewer
        env:
          ESCALATE: ${{ steps.model.outputs.escalate }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_DATA_PATH: /tmp/issue.json
          REVIEW_FINDINGS_PATH: /tmp/review-findings.md
        run: pnpm exec tsx .sandcastle/review.ts

      - name: Push fixes and post review comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OUTCOME: ${{ steps.reviewer.outputs.outcome }}
          PUSH: ${{ steps.reviewer.outputs.push }}
          COMMITS: ${{ steps.reviewer.outputs.commits }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$PUSH" = "true" ]; then
            git push origin "$BRANCH"
          fi

          case "$OUTCOME" in
            fixed)
              HEADER="✅ Reviewed, fixed ${COMMITS} issue(s), each fix linked to its SHA" ;;
            clean)
              HEADER="✅ Reviewed — no issues found" ;;
            flagged)
              HEADER="⚠️ Found issues, couldn't safely fix — list for the maintainer" ;;
            *)
              HEADER="❌ Review failed — ${RUN_URL}" ;;
          esac

          {
            echo "$HEADER"
            if [ -f "$REVIEW_FINDINGS_PATH" ]; then
              echo
              cat "$REVIEW_FINDINGS_PATH"
            fi
          } > /tmp/review-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/review-comment.md
