<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vata app icon source</title>
    <style>
      /* Vendored Fraunces italic 500, subsetted to "V" (~1KB).
         Source: Google Fonts / github.com/undercasetype/Fraunces (SIL OFL 1.1).
         License: ./fonts/OFL.txt */
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 500;
        font-display: block;
        src: url("./fonts/Fraunces-Italic-500-subset-V.woff2") format("woff2");
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        background: transparent;
        overflow: hidden;
      }
      svg {
        width: 1024px;
        height: 1024px;
        display: block;
      }
      text {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-weight: 500;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <!--
      Apple macOS icon template (HIG, used by Icon Composer):
        Canvas 1024×1024, mostly transparent.
        Tile 824×824 centred in canvas (100 px gutter on every side).
        Corner radius 185 px on the 824 tile (≈22.5% of tile side).
        Flat fill — gradient, sheen, shadow are applied by the OS
        compositor (or by Icon Composer for Tahoe's .icon format).
        The 100 px gutter is what macOS uses to draw the specular
        highlight / drop shadow; baking our own effects fights it.
      Artwork: V + brushstroke from mark.svg, 648×648 (~78% of tile)
      centred inside the tile — matches the visual density of Apple's
      reference icons (Notes, Reminders).
    -->
    <svg
      width="1024"
      height="1024"
      viewBox="0 0 1024 1024"
      xmlns="http://www.w3.org/2000/svg"
    >
      <rect
        x="100"
        y="100"
        width="824"
        height="824"
        rx="185"
        ry="185"
        fill="#1f1b17"
      />
      <svg
        x="188"
        y="188"
        width="648"
        height="648"
        viewBox="0 0 48 48"
      >
        <text
          x="24"
          y="36"
          text-anchor="middle"
          font-size="40"
          fill="#f1ece2"
        >
          V
        </text>
        <path
          d="M10 42 Q 24 40, 38 41"
          fill="none"
          stroke="#c56a3a"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </svg>
    </svg>
  </body>
</html>
