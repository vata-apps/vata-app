<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vata app icon source</title>
    <style>
      /* Vendored Fraunces italic 500, subsetted to "V" (~1KB).
         Source: Google Fonts / github.com/undercasetype/Fraunces (SIL OFL 1.1).
         License: ./fonts/OFL.txt */
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 500;
        font-display: block;
        src: url("./fonts/Fraunces-Italic-500-subset-V.woff2") format("woff2");
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        background: transparent;
        overflow: hidden;
      }
      svg {
        width: 1024px;
        height: 1024px;
        display: block;
      }
      text {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-weight: 500;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <!--
      Tile: 1024×1024 squircle (rx ≈ 22% of side ≈ 226) in sand-950.
      Artwork: the V+brushstroke from mark.svg, scaled so the 48-unit
      viewBox fills ~88% of the tile (inner 900 px centered).
    -->
    <svg
      width="1024"
      height="1024"
      viewBox="0 0 1024 1024"
      xmlns="http://www.w3.org/2000/svg"
    >
      <rect
        width="1024"
        height="1024"
        rx="226"
        ry="226"
        fill="#1f1b17"
      />
      <svg
        x="62"
        y="62"
        width="900"
        height="900"
        viewBox="0 0 48 48"
      >
        <text
          x="24"
          y="36"
          text-anchor="middle"
          font-size="40"
          fill="#f1ece2"
        >
          V
        </text>
        <path
          d="M10 42 Q 24 40, 38 41"
          fill="none"
          stroke="#c56a3a"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </svg>
    </svg>
  </body>
</html>
